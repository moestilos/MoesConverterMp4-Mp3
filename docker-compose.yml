services:
  backend:
    build:
      context: ./backend
    container_name: moesconverter-backend
    ports:
      - "4000:4000"
    environment:
      PORT: 4000
      CORS_ORIGIN: http://localhost:4321
      MAX_FILE_SIZE: 104857600
      FILE_TTL_MS: 900000
    volumes:
      - backend_uploads:/app/uploads
      - backend_outputs:/app/outputs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4000/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  frontend:
    build:
      context: ./frontend
      args:
        PUBLIC_API_URL: http://localhost:4000
    container_name: moesconverter-frontend
    ports:
      - "4321:4321"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  backend_uploads:
  backend_outputs:
